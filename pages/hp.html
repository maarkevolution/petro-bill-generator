<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HP Petrol Pump Billing System</title>

    <link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

    HP Petrol Pump Billing System

</header>

<div class="container">

<div class="billing">

<!-- ========================= -->
<!-- Left Side Form -->
<!-- ========================= -->

<div class="card">

<h2>Bill Entry</h2>

<form id="billForm">

<label>Petrol Pump Name</label>

<input
type="text"
value="Millennium Ahmedabad"
readonly>

<label>Bill Number</label>

<input
type="text"
id="billNo"
readonly>

<label>Transaction ID</label>

<input
type="text"
id="transactionId"
readonly>

<label>Date</label>

<input
type="date"
id="date">

<label>Time</label>

<input
type="time"
id="time">

<label>Fuel Type</label>

<select id="fuel">

<option>Petrol</option>

<option>Diesel</option>

<option>CNG</option>

</select>

<label>Density</label>

<input
type="number"
id="density"
value="753.1">

<label>Rate (₹)</label>

<input
type="number"
id="rate"
placeholder="101.69">

<label>Amount (₹)</label>

<input
type="number"
id="amount"
placeholder="300">

<label>Volume (Litre)</label>

<input
type="text"
id="volume"
readonly>

<button
type="button"
class="btn"
id="generateBtn">

Generate Receipt

</button>

<button
type="button"
class="btn print"
onclick="window.print()">

Print Receipt

</button>

</form>

</div>

<!-- ========================= -->
<!-- Right Side Receipt -->
<!-- ========================= -->

<div class="receipt">

<h3>HP</h3>

<p style="justify-content:center;">
Millennium Ahmedabad
</p>

<hr>

<p>
<span>Bill No</span>

<span id="rBillNo">-----</span>
</p>

<p>
<span>Transaction</span>

<span id="rTransaction">-----</span>
</p>

<p>
<span>Date</span>

<span id="rDate">-----</span>
</p>

<p>
<span>Time</span>

<span id="rTime">-----</span>
</p>

<p>
<span>Fuel</span>

<span id="rFuel">-----</span>
</p>

<p>
<span>Density</span>

<span id="rDensity">-----</span>
</p>

<p>
<span>Rate</span>

<span id="rRate">-----</span>
</p>

<p>
<span>Amount</span>

<span id="rAmount">-----</span>
</p>

<p>
<span>Volume</span>

<span id="rVolume">-----</span>
</p>

<hr>

<p style="justify-content:center;">
Thank You Visit Again
</p>

</div>

</div>

</div>

<script src="../script.js"></script>

</body>

</html>
