<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petro Bill Generator</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<section id="home" class="home">
  <h1>Petro Bill Generator</h1>
  <p>Multi Petrol Pump Billing System</p>
  <div id="companyGrid" class="grid"></div>
</section>

<section id="billing" class="billing hidden">
  <div class="form-card">
    <button class="back" onclick="goHome()">Back</button>
    <h2 id="companyTitle"></h2>

    <label>Pump Name</label>
    <input id="pumpName">

    <label>Bill No</label>
   <input id="billNo" oninput="updateBill()">

    <label>Transaction ID</label>
    <input id="transactionId" readonly>

    <label>Attendant ID</label>
    <input id="attendantId" value="NotEntered">

    <label>Receipt Type</label>
    <input id="receiptType" value="Physical Receipt">

    <label>Vehicle No</label>
    <input id="vehicleNo" value="NotEntered">

    <label>Mobile No</label>
    <input id="mobileNo" value="NotEntered">

    <label>Date</label>
    <input id="date" type="date">

    <label>Time</label>
    <input id="time" readonly>

    <label>FP. ID</label>
    <input id="fpId" value="1">

    <label>Nozzle No</label>
    <input id="nozzleNo" value="1">

    <label>Fuel Type</label>
    <select id="fuelType" onchange="updateBill()">
      <option value="PETROL">PETROL</option>
      <option value="DIESEL">DIESEL</option>
      <option value="CNG">CNG</option>
    </select>

    <label>Density</label>
    <input id="density" readonly>

    <label>Preset</label>
    <input id="preset" type="number" value="0" oninput="updateBill()">

    <label>Rate</label>
    <input id="rate" type="number" value="116.65" oninput="updateBill()">

    <label>Sale Amount</label>
    <input id="sale" type="number" value="1215.47" oninput="updateBill()">

    <label>Volume</label>
    <input id="volume" readonly>

    <button class="btn" onclick="updateBill()">Generate Bill</button>
    <button class="btn print" onclick="window.print()">Print Bill</button>
    <button class="btn image" onclick="downloadImage()">Download Image</button>
    <button class="btn pdf" onclick="downloadPDF()">Generate PDF</button>
  </div>

  <div class="receipt-wrap">
    <div id="receipt" class="receipt">
      <img id="receiptLogo" class="receipt-logo" src="" alt="Petrol pump logo">
      <h3 id="receiptPump"></h3>
      <pre id="receiptText"></pre>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
